            padding: 0;
            box-sizing: border-box;
        }

        body {

            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 10px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 2.5em;
            color: #ec407a;
            margin: 10px 0;
        }

        .subtitle {
            color: #666;
            font-size: 1.1em;
            font-style: italic;
        }

        .sticky-bar {
            position: sticky;
            top: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            flex-wrap: wrap;
            gap: 8px;
        }

        .sticky-bar-item {
            font-size: 0.85em;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .input-group {
            margin: 15px 0;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        .input-group input, .input-group select, .input-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            font-family: inherit;
        }

        .trait-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 10px;
            margin: 10px 0;
        }

        .trait-btn {
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            background: white;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.9em;
        }

        .trait-btn.selected {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .character-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
            margin: 15px 0;
        }

        .character-card {
            border: 3px solid #e0e0e0;
            border-radius: 12px;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: white;
            position: relative;
        }

        .character-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }

        .character-card.selected {
            border-color: #ec407a;
            background: #fce4ec;
        }

        .character-card.custom {
            border: 3px dashed #667eea;
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
        }

        .char-emoji {
            font-size: 2.5em;
            margin: 8px 0;
        }

        .char-name {
            font-weight: 600;
            font-size: 1em;
            margin: 6px 0;
        }

        .char-desc {
            font-size: 0.75em;
            color: #666;
            margin-top: 4px;
        }

        .char-stats {
            position: absolute;
            top: 8px;
            right: 8px;
            font-size: 0.7em;
            color: #10b981;
            font-weight: 600;
        }

        .bio-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }

        .bio-content {
            background: white;
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .location-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 10px;
            margin: 15px 0;
        }

        .location-card {
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            background: white;
        }

        .location-card:hover {
            border-color: #667eea;
            background: #f5f7ff;
        }

        .location-card.selected {
            border-color: #667eea;
            background: #667eea;
            color: white;
        }

        .time-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(90px, 1fr));
            gap: 8px;
            margin: 10px 0;
        }

        .time-btn {
            padding: 8px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            background: white;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.85em;
        }

        .time-btn.selected {
            background: #764ba2;
            color: white;
            border-color: #764ba2;
        }

        .actions-grid {
            display: grid;
            gap: 8px;
            margin: 15px 0;
        }

        .action-btn {
            padding: 10px 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            background: white;
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
            font-size: 0.9em;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .action-btn:hover {
            background: #f5f7ff;
            border-color: #667eea;
        }

        .action-btn.risk-low {
            border-left: 4px solid #10b981;
        }

        .action-btn.risk-medium {
            border-left: 4px solid #f59e0b;
        }

        .action-btn.risk-high {
            border-left: 4px solid #ef4444;
        }

        .action-btn:active {
            transform: scale(0.98);
        }

        .custom-action {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }

        .custom-action input {
            flex: 1;
            padding: 10px;
            border: 2px solid #667eea;
            border-radius: 8px;
            font-size: 0.9em;
        }

        .response-box {
            margin: 15px 0;
            padding: 15px;
            border-radius: 10px;
            animation: fadeIn 0.5s;
        }

        .player-action {
            background: linear-gradient(135deg, #06b6d4 0%, #0891b2 100%);
            color: white;
            margin-bottom: 10px;
        }

        .char-response {
            background: linear-gradient(135deg, #fb923c 0%, #f97316 100%);
            color: white;
        }

        .relationship-stage {
            background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
            padding: 12px;
            border-radius: 10px;
            margin: 15px 0;
            text-align: center;
            font-weight: 600;
            color: #78350f;
            font-size: 1.1em;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pointPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }

        @keyframes pointShake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-6px); }
            40% { transform: translateX(6px); }
            60% { transform: translateX(-4px); }
            80% { transform: translateX(4px); }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .point-positive {
            animation: pointPulse 0.5s ease-out;
        }

        .point-negative {
            animation: pointShake 0.4s ease-out;
        }

        .score-breakdown {
            background: rgba(255,255,255,0.15);
            border-radius: 8px;
            padding: 8px 12px;
            margin-top: 8px;
            font-size: 0.85em;
            animation: slideUp 0.3s ease-out;
        }

        .breakdown-item {
            display: flex;
            justify-content: space-between;
            padding: 2px 0;
            opacity: 0.9;
        }

        .breakdown-item .value-positive { color: #a7f3d0; font-weight: 600; }
        .breakdown-item .value-negative { color: #fca5a5; font-weight: 600; }

            flex-wrap: wrap;
            gap: 6px;
            margin: 8px 0;
        }

        .memory-hint {

            padding: 4px 10px;
            border-radius: 20px;

            font-weight: 500;

        .location-preferred {

        }

        .location-preferred::after {

            position: absolute;
            top: 2px;
            right: 4px;
            font-size: 0.7em;

        .btn-primary {

            right: 0;

        function updateMemory(actionText, points) {
            const mem = gameState.charMemory;
            const lower = actionText.toLowerCase();
            if (points > 10) {
                mem.trustLevel += 2;
            } else if (points > 0) {
                mem.trustLevel += 1;
            } else if (points < -5) {
                mem.trustLevel = Math.max(0, mem.trustLevel - 2);
            } else if (points < 0) {
                mem.trustLevel = Math.max(0, mem.trustLevel - 1);
            }
            const humorWords = ['joke', 'funny', 'laugh', 'humor', 'pun', 'comedy'];
            const deepWords = ['discuss', 'philosophy', 'literature', 'meaning', 'think', 'intellectual', 'knowledge'];
            const physicalWords = ['dance', 'workout', 'jog', 'swim', 'volleyball', 'gym', 'sport'];
            const bragWords = ['show off', 'brag', 'best', 'amazing at', 'unsolicited', 'credit'];
            const rudeWords = ['stare', 'ignore', 'complain', 'argue', 'spill', 'kick', 'loud'];

            if (humorWords.some(w => lower.includes(w)) && points > 0) mem.likesHumor = true;
            if (deepWords.some(w => lower.includes(w)) && points > 0) mem.likesDeepTalk = true;
            if (physicalWords.some(w => lower.includes(w)) && points > 0) mem.likesPhysical = true;
            if (bragWords.some(w => lower.includes(w)) && points < 0) mem.hateBragging = true;
            if (rudeWords.some(w => lower.includes(w)) && points < 0) mem.hateRude = true;

            if (points > 5 && !mem.positiveTopics.includes(actionText)) {
                mem.positiveTopics.push(actionText);
                if (mem.positiveTopics.length > 5) mem.positiveTopics.shift();
            }
            if (points < -3 && !mem.negativeTopics.includes(actionText)) {
                mem.negativeTopics.push(actionText);
                if (mem.negativeTopics.length > 5) mem.negativeTopics.shift();
            }
        }

        function calculatePoints(action, repeated) {
            const char = characters.find(c => c.name === gameState.targetChar) || gameState.customChar;
            const breakdown = [];
            let points = action.base;
            breakdown.push({ label: 'Base', value: action.base });

            if (char.preferences.locations.includes(gameState.location)) {
                points += 5;
                breakdown.push({ label: '📍 Location match', value: 5 });
            }
            if (char.preferences.times.includes(gameState.timeOfDay)) {
                points += 5;
                breakdown.push({ label: '⏰ Time match', value: 5 });
            }
            if (gameState.playerTraits.age && char.preferences.age.includes(gameState.playerTraits.age)) {
                points += 8;
                breakdown.push({ label: '🎂 Age match', value: 8 });
            }
            if (char.preferences.attracted_to.includes(gameState.playerGender)) {
                points += 10;
                breakdown.push({ label: '💕 Attraction match', value: 10 });
            } else {
                points -= 5;
                breakdown.push({ label: '💔 No attraction', value: -5 });
            }
            if (gameState.playerTraits.interests.some(i => char.interests.includes(i))) {
                points += 6;
                breakdown.push({ label: '🎯 Shared interest', value: 6 });
            }
            if (gameState.playerTraits.personality === 'outgoing' && ['bar', 'club'].includes(gameState.location)) {
                points += 4;
                breakdown.push({ label: '😄 Personality fit', value: 4 });
            }
            if (gameState.playerTraits.personality === 'reserved' && ['library', 'cafe'].includes(gameState.location)) {
                points += 4;
                breakdown.push({ label: '😌 Personality fit', value: 4 });
            }
            if (gameState.playerTraits.style === 'professional' && gameState.location === 'work') {
                points += 5;
                breakdown.push({ label: '💼 Style bonus', value: 5 });
            }
            if (gameState.playerTraits.style === 'casual' && ['park', 'beach'].includes(gameState.location)) {
                points += 5;
                breakdown.push({ label: '👕 Style bonus', value: 5 });
            }
            // Character memory: trust bonus
            const memory = gameState.charMemory;
            if (memory.trustLevel > 3) {
                const trustBonus = Math.min(Math.floor(memory.trustLevel / 2), 5);
                points += trustBonus;
                breakdown.push({ label: '🤝 Trust bonus', value: trustBonus });
            }
            if (gameState.streak >= 3) {
                points += 3;
                breakdown.push({ label: '🔥 Streak bonus', value: 3 });
            }
            if (repeated) {
                const penalty = points - Math.floor(points * 0.4);
                points = Math.floor(points * 0.4);
                breakdown.push({ label: '🔁 Repeat penalty', value: -penalty });
            }

            return { total: points, breakdown };
        }

        function analyzeCustomAction(text) {
            const lower = text.toLowerCase();
            const char = characters.find(c => c.name === gameState.targetChar) || gameState.customChar;
            const stage = getRelationshipStage(gameState.points);
            const mem = gameState.charMemory;

            const compliments = ['beautiful', 'gorgeous', 'amazing', 'wonderful', 'stunning', 'incredible'];
            const help = ['help', 'assist', 'support', 'join', 'together'];
            const negative = ['stupid', 'ugly', 'boring', 'dumb', 'weird', 'creepy'];
            const romantic = ['love', 'kiss', 'date', 'marry', 'forever', 'heart', 'adore'];
            const humorWords = ['joke', 'funny', 'laugh', 'humor', 'pun'];
            const deepWords = ['discuss', 'philosophy', 'literature', 'meaning', 'think', 'books'];

            if (negative.some(w => lower.includes(w))) {
                return { points: -10, response: random(char.speech.bad), breakdown: [{ label: 'Negative words', value: -10 }] };
            }

            if (romantic.some(w => lower.includes(w))) {
                let successChance;
                if (stage.includes('Partner')) successChance = 0.95;
                else if (stage.includes('Love Interest')) successChance = 0.80;
                else if (stage.includes('Friend')) successChance = 0.55;
                else if (stage.includes('Acquaintance')) successChance = 0.25;
                else successChance = 0.10;
                if (mem.trustLevel >= 5) successChance = Math.min(successChance + 0.15, 0.95);
                const success = Math.random() < successChance;
                const breakdown = [{ label: 'Romantic action', value: success ? 20 : -8 }];
                if (!success && stage.includes('Stranger')) breakdown.push({ label: '⚠️ Too early!', value: 0 });
                return success ?
                    { points: 20, response: random(char.speech.great), breakdown } :
                    { points: -8, response: (stage.includes('Stranger') || stage.includes('Acquaintance')) ? `"Whoa, we just met... that's a bit forward." ${random(char.speech.poor)}` : random(char.speech.bad), breakdown };
            }

            if (compliments.some(w => lower.includes(w))) {
                const pts = mem.trustLevel >= 3 ? 14 : 10;
                return { points: pts, response: random(char.speech.good), breakdown: [{ label: 'Compliment', value: pts }] };
            }

            if (humorWords.some(w => lower.includes(w))) {
                const pts = mem.likesHumor ? 16 : 8;
                return { points: pts, response: mem.likesHumor ? `Ha! You know I love humor! ${random(char.speech.great)}` : random(char.speech.good), breakdown: [{ label: mem.likesHumor ? 'Humor (they love it!)' : 'Humor', value: pts }] };
            }

            if (deepWords.some(w => lower.includes(w))) {
                const pts = mem.likesDeepTalk ? 16 : 10;
                return { points: pts, response: mem.likesDeepTalk ? `I love these conversations with you! ${random(char.speech.great)}` : random(char.speech.good), breakdown: [{ label: mem.likesDeepTalk ? 'Deep talk (they love it!)' : 'Deep talk', value: pts }] };
            }

            if (help.some(w => lower.includes(w))) {
                return { points: 14, response: random(char.speech.good), breakdown: [{ label: 'Helpful action', value: 14 }] };
            }

            if (lower.includes('yourself') || lower.includes('be yourself')) {
                return { points: 10, response: random(char.speech.good), breakdown: [{ label: 'Authentic', value: 10 }] };
            }

            if (lower.includes(char.name.toLowerCase())) {
                return { points: 5, response: "You remembered my name! " + random(char.speech.good), breakdown: [{ label: 'Used their name', value: 5 }] };
            }

            const randomPoints = Math.floor(Math.random() * 16) - 3;
            const responseLevel = randomPoints > 10 ? 'great' : randomPoints > 5 ? 'good' : randomPoints > 0 ? 'poor' : 'bad';
            return { points: randomPoints, response: random(char.speech[responseLevel]), breakdown: [{ label: 'Custom action', value: randomPoints }] };
        }

        }

        function selectTime(time) {
            gameState.timeOfDay = time;
            render();
        }

        function selectLocation(loc) {
            gameState.location = loc;
            render();
        }

        function takeAction(index, actionText) {
            try {
                const action = actions[gameState.location][index];
                const repeated = gameState.lastAction === actionText;
                const result = calculatePoints(action, repeated);
                const points = result.total;
                const response = getResponse(points, gameState.targetChar);

                updateMemory(actionText, points);
                gameState.actionHistory.push({ actionText, points, response, breakdown: result.breakdown, location: gameState.location });
                gameState.points += points;
                gameState.encounterNum++;
                gameState.lastPointChange = points;

                if (points > 0) {
                    gameState.streak++;
                } else {
                    gameState.streak = 0;
                }

                gameState.lastAction = actionText;
                checkAchievements();

                if (gameState.encounterNum >= gameState.maxEncounters) {
                    gameState.screen = 'result';
                }

                render();
            } catch (error) {
                console.error('Error in takeAction:', error);
                alert('Oops! Something went wrong. Please refresh and try again.');
            }
        }

        function takeCustomAction() {
            try {
                const input = document.getElementById('customAction');
                if (!input) return;

                const text = input.value.trim();
                if (!text) {
                    alert('Please type an action first!');
                    return;
                }

                const result = analyzeCustomAction(text);
                const actionText = text;

                updateMemory(actionText, result.points);
                gameState.actionHistory.push({ actionText, points: result.points, response: result.response, breakdown: result.breakdown || [], location: gameState.location });
                gameState.points += result.points;
                gameState.encounterNum++;
                gameState.lastPointChange = result.points;
                gameState.customActionCount = (gameState.customActionCount || 0) + 1;

                if (result.points > 0) {
                    gameState.streak++;
                } else {
                    gameState.streak = 0;
                }

                checkAchievements();

                if (gameState.encounterNum >= gameState.maxEncounters) {
                    gameState.screen = 'result';
                }

                render();
            } catch (error) {
                console.error('Error in takeCustomAction:', error);
                alert('Oops! Something went wrong. Please try again.');
            }
        }

        function nextEncounter() {
            gameState.screen = 'location';
            gameState.location = null;
            gameState.timeOfDay = null;
            render();
        }

        function endGame() {
            gameState.screen = 'result';
            render();
        }

        function quickReplay() {
            const targetChar = gameState.targetChar;
            const customChar = gameState.customChar;
            const playerName = gameState.playerName;
            const playerGender = gameState.playerGender;
            const playerTraits = {...gameState.playerTraits};

            gameState = {
                screen: 'location',
                playerName,
                playerGender,
                playerTraits,
                targetChar,
                location: null,
                timeOfDay: null,
                encounterNum: 0,
                maxEncounters: 8,
                points: 0,
                requiredPoints: 100,
                actionHistory: [],
                achievements: [],
                streak: 0,
                lastAction: null,
                lastPointChange: undefined,
                customActionCount: 0,
                relationshipStage: 'Stranger',
                customChar,
                showBio: null,
                showAbout: false,
                charMemory: { trustLevel: 0, likesHumor: false, likesDeepTalk: false, likesPhysical: false, hateBragging: false, hateRude: false, positiveTopics: [], negativeTopics: [] }
            };
            render();
        }

        function resetGame() {
            gameState = {
                screen: 'menu',
                playerName: '',
                playerGender: null,
                playerTraits: { age: null, personality: null, interests: [], style: null },
                targetChar: null,
                location: null,
                timeOfDay: null,
                encounterNum: 0,
                maxEncounters: 8,
                points: 0,
                requiredPoints: 100,
                actionHistory: [],
                achievements: [],
                streak: 0,
                lastAction: null,
                lastPointChange: undefined,
                customActionCount: 0,
                relationshipStage: 'Stranger',
                customChar: null,
                showBio: null,
                showAbout: false,
                charMemory: { trustLevel: 0, likesHumor: false, likesDeepTalk: false, likesPhysical: false, hateBragging: false, hateRude: false, positiveTopics: [], negativeTopics: [] }
            };
            render();
        }

        render();
    </script>
